<div class="container">
  <div class="card">
    <div class="card-header">
      <h1>Create Account</h1>
      <p>Register as an org admin</p>
    </div>
    <div class="card-body">
<div class="form-group">
        <label>Organization</label>
        <select [(ngModel)]="organizationId">
          <option value="" disabled>Select organization…</option>
          @for (org of orgs(); track org.id) {
            <option [value]="org.id">{{ org.name }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="admin@example.com"
        />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          (keydown.enter)="signup()"
          placeholder="••••••••"
        />
      </div>
      <button class="btn-primary" (click)="signup()">Sign Up</button>
      <p class="form-footer">
        Already have an account?
        <a routerLink="/login" class="link-btn">Sign in</a>
      </p>
    </div>
  </div>
</div>
