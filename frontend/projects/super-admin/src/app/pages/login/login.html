<div class="container">
  <div class="card">
    <div class="card-header">
      <h1>Super Admin Login</h1>
      <p>Sign in to manage organizations</p>
    </div>
    <div class="card-body">
<div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="super-admin@example.com"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          (keydown.enter)="login()"
          placeholder="••••••••"
        />
      </div>

      <button class="btn-primary" (click)="login()">Sign In</button>
    </div>
  </div>
</div>
